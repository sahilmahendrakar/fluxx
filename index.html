<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Flux</title>
    <script>
      (function () {
        try {
          var key = 'flux.theme';
          var v = localStorage.getItem(key);
          document.documentElement.dataset.theme = v === 'light' ? 'light' : 'dark';
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer.tsx"></script>
  </body>
</html>
