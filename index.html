<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Fluxx</title>
    <style>
      @keyframes fluxx-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div
        id="app-boot"
        style="
          display: flex;
          min-height: 100vh;
          width: 100%;
          align-items: center;
          justify-content: center;
          flex-direction: column;
          gap: 20px;
          background: #09090b;
          color: #a1a1aa;
          font-family: system-ui, -apple-system, sans-serif;
        "
      >
        <span
          style="
            display: block;
            width: 20px;
            height: 20px;
            border: 2px solid #3f3f46;
            border-top-color: #e4e4e7;
            border-radius: 50%;
            animation: fluxx-boot-spin 0.8s linear infinite;
          "
          aria-hidden="true"
        ></span>
        <span style="font-size: 14px; font-weight: 500; letter-spacing: -0.01em">Fluxx</span>
      </div>
    </div>
    <script type="module" src="/src/renderer.tsx"></script>
  </body>
</html>
