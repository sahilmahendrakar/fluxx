# Fluxx-owned tmux configuration (tmux 2.1+ required for `set -g mouse on`).
# Loaded on every Fluxx tmux invocation via `tmux -f <this-file>` so behavior
# does not depend on the user's ~/.tmux.conf.

set -g mouse on
setw -g alternate-screen on

# Wheel: scroll copy-mode history; pass wheel through in alternate-screen apps (less, man, vim).
bind -n WheelUpPane if-shell -F "#{pane_in_mode}" "send-keys -M" "if-shell -F '#{alternate_on}' 'send-keys -M' 'copy-mode -e; send-keys -M'"
bind -n WheelDownPane if-shell -F "#{pane_in_mode}" "send-keys -M" "send-keys -M"

# Copy-mode selections → system clipboard (pbcopy on macOS; xclip/xsel on Linux when installed).
# Keep in sync with FLUXX_TMUX_CLIPBOARD_PIPE_COMMAND in fluxxTmuxClipboardPipe.ts.
set -g @fluxx_clipboard_pipe "command -v pbcopy >/dev/null 2>&1 && pbcopy || { command -v xclip >/dev/null 2>&1 && xclip -in -selection clipboard || { command -v xsel >/dev/null 2>&1 && xsel --clipboard --input || cat >/dev/null; }; }"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "#{@fluxx_clipboard_pipe}"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{@fluxx_clipboard_pipe}"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "#{@fluxx_clipboard_pipe}"
bind-key -T copy-mode-vi MouseDragEnd2Pane send-keys -X copy-pipe-and-cancel "#{@fluxx_clipboard_pipe}"
bind-key -T copy-mode Enter send-keys -X copy-pipe-and-cancel "#{@fluxx_clipboard_pipe}"
bind-key -T copy-mode M-w send-keys -X copy-pipe-and-cancel "#{@fluxx_clipboard_pipe}"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "#{@fluxx_clipboard_pipe}"
bind-key -T copy-mode MouseDragEnd2Pane send-keys -X copy-pipe-and-cancel "#{@fluxx_clipboard_pipe}"
